version: 2

models:
  - name: dim_product
    columns:
      - name: product_id
        data_tests:
          - unique
          - not_null

  - name: dim_seller
    columns:
      - name: seller_id
        data_tests:
          - unique
          - not_null

  - name: dim_customer
    columns:
      - name: customer_id
        data_tests:
          - unique
          - not_null

  - name: dim_date
    columns:
      - name: date_day
        data_tests:
          - unique
          - not_null

  - name: fact_sales
    columns:
      - name: product_id
        data_tests:
          - relationships:
              to: ref('dim_product')
              field: product_id
      - name: seller_id
        data_tests:
          - relationships:
              to: ref('dim_seller')
              field: seller_id
      - name: customer_id
        data_tests:
          - relationships:
              to: ref('dim_customer')
              field: customer_id
    data_tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns:
            - order_id
            - order_item_id
